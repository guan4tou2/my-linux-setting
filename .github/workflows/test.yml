name: Test Installation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 防止同一個 PR 多次推送同時跑（節省 runner）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1. Static checks (always runs, fast feedback < 1 min)
  #    純語法 / shellcheck / 結構檢查，沒有任何安裝動作
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash -n on every shell script
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            if ! bash -n "$f"; then
              echo "::error file=$f::bash syntax error"
              fail=1
            fi
          done < <(find . -type f \( -name "*.sh" -o -name "*.bash" \) \
                          -not -path "./.git/*" -not -path "./node_modules/*")
          exit $fail

      - name: Run unit-style script tests (test_scripts.sh)
        env:
          CI: true
          SKIP_NETWORK_TESTS: true
          NON_INTERACTIVE: true
        run: bash tests/test_scripts.sh

  # ---------------------------------------------------------------------------
  # 2. Functional tests (Linux runner, vanilla ubuntu)
  #    跑 test_dependencies + test_functionality；測試本身對 CI 環境友善
  # ---------------------------------------------------------------------------
  functional:
    name: Functional (vanilla ubuntu)
    runs-on: ubuntu-latest
    needs: lint
    env:
      CI: true
      SKIP_NETWORK_TESTS: true
      NON_INTERACTIVE: true
      FORCE_LINUX_TESTS: true
    steps:
      - uses: actions/checkout@v4

      - name: Run unified test suite
        run: bash tests/run_all_tests.sh

  # ---------------------------------------------------------------------------
  # 3. Real install simulation (docker, slow but high-fidelity)
  #    在 docker 容器跑完整 install.sh，最接近使用者真實環境
  # ---------------------------------------------------------------------------
  install-simulation:
    name: Install simulation (docker)
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Build docker image
        run: ./docker-test.sh build

      - name: Run basic script tests inside docker
        run: ./docker-test.sh test

      - name: Run full installation simulation
        run: |
          export HOST_FOR_CONTAINER=$(hostname -I | awk '{print $1}')
          bash tests/test_full_simulation.sh
